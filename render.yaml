services:
  # AI Backend - FastAPI service (Docker-based)
  - type: web
    name: fraudlens-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: APP_NAME
        value: FraudLens AI
      - key: APP_VERSION
        value: "1.0.0"
      - key: MODEL_PATH
        value: saved_models/best_model.pkl
      - key: SCALER_PATH
        value: saved_models/scaler.pkl
      - key: LOG_LEVEL
        value: INFO

  # Frontend - Static site (React + Vite)
  - type: web
    name: fraudlens-ai-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: fraudlens-ai-backend
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
